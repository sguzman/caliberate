[app]
name = "caliberate"
environment = "development"
mode = "dev"
instance_id = "local"

[paths]
data_dir = "./data"
cache_dir = "./cache"
log_dir = "./logs"
tmp_dir = "./tmp"
library_dir = "./library"

[logging]
level = "info"
json = false
stdout = true
file_enabled = false
file_max_size_mb = 50
file_max_backups = 5

[db]
sqlite_path = "./data/caliberate.db"
pool_size = 4
busy_timeout_ms = 5000

[runtime]
worker_threads = 4
max_blocking_threads = 64
shutdown_timeout_ms = 5000

[server]
host = "127.0.0.1"
port = 8080
scheme = "http"
url_prefix = ""
enable_auth = false
auth_mode = "bearer"
api_keys = []
download_enabled = true
download_max_bytes = 104857600
download_allow_external = false

[metrics]
enabled = false
endpoint = ""
namespace = "caliberate"

[formats]
supported = ["epub", "mobi", "azw", "azw3", "pdf", "docx"]
archive_formats = ["zip", "rar", "7z", "zpaq"]

[ingest]
default_mode = "copy"
archive_reference_enabled = true
duplicate_policy = "error"
duplicate_identical_policy = "skip"
duplicate_compare = "checksum"
background_enabled = false
background_workers = 2
background_queue_capacity = 64

[assets]
compress_raw_assets = true
compress_metadata_db = false
hash_algorithm = "sha256"
hash_on_ingest = true
verify_checksum = true
compression_level = 3

[library]
delete_files_on_remove = false
delete_reference_files = false

[conversion]
enabled = true
allow_passthrough = true
max_input_bytes = 104857600
default_output_format = "epub"
temp_dir = "./tmp/conversion"
output_dir = "./output/conversion"

[fts]
enabled = false
tokenizer = "unicode61 remove_diacritics 2"
rebuild_on_migrate = true
min_query_len = 2
result_limit = 100

[device]
mount_roots = ["./devices", "/media", "/run/media"]
library_subdir = "Caliberate Library"

[plugins]
enabled = true
plugins_dir = "./plugins"

[gui]
list_view_mode = "table"
table_row_height = 48.0
table_column_min_width = 80.0
table_column_max_width = 520.0
show_title = true
show_authors = true
show_series = true
show_tags = true
show_formats = true
show_rating = true
show_publisher = true
show_languages = true
width_title = 240.0
width_authors = 180.0
width_series = 140.0
width_tags = 180.0
width_formats = 120.0
width_rating = 90.0
width_publisher = 160.0
width_languages = 120.0
