[app]
name = "caliberate"
environment = "development"
mode = "dev"
instance_id = "local"

[paths]
data_dir = "./.cache/caliberate/data"
cache_dir = "./.cache/caliberate/cache"
log_dir = "./.cache/caliberate/logs"
tmp_dir = "./.cache/caliberate/tmp"
library_dir = "./.cache/caliberate/library"

[logging]
level = "info"
json = false
stdout = true
file_enabled = false
file_max_size_mb = 50
file_max_backups = 5

[db]
sqlite_path = "./.cache/caliberate/data/caliberate.db"
pool_size = 4
busy_timeout_ms = 5000

[runtime]
worker_threads = 4
max_blocking_threads = 64
shutdown_timeout_ms = 5000

[server]
host = "127.0.0.1"
port = 8080
scheme = "http"
url_prefix = ""
enable_auth = false
auth_mode = "bearer"
api_keys = []
tls_enabled = false
tls_cert_path = ""
tls_key_path = ""
download_enabled = true
download_max_bytes = 104857600
download_allow_external = false

[metrics]
enabled = false
endpoint = ""
namespace = "caliberate"

[formats]
supported = [
    "epub",
    "mobi",
    "azw",
    "azw3",
    "pdf",
    "docx",
]
archive_formats = [
    "zip",
    "rar",
    "7z",
    "zpaq",
]

[ingest]
default_mode = "copy"
archive_reference_enabled = true
duplicate_policy = "error"
duplicate_identical_policy = "skip"
duplicate_compare = "checksum"
background_enabled = false
background_workers = 2
background_queue_capacity = 64

[assets]
compress_raw_assets = true
compress_metadata_db = false
hash_algorithm = "sha256"
hash_on_ingest = true
verify_checksum = true
compression_level = 3

[library]
delete_files_on_remove = false
delete_reference_files = false

[conversion]
enabled = true
allow_passthrough = true
max_input_bytes = 104857600
default_output_format = "epub"
input_profiles = [
    "default",
    "tablet",
    "phone",
    "kindle",
]
output_profiles = [
    "default",
    "tablet",
    "phone",
    "kindle",
]
default_input_profile = "default"
default_output_profile = "default"
heuristic_enable = true
heuristic_unwrap_lines = true
heuristic_delete_blank_lines = false
page_margin_left = 5.0
page_margin_right = 5.0
page_margin_top = 5.0
page_margin_bottom = 5.0
embed_fonts = false
subset_fonts = true
cover_policy = "keep"
warn_unsupported_options = true
save_to_disk_template = "{title}-{id}.{format}"
save_to_disk_conflict_policy = "rename"
temp_dir = "./.cache/caliberate/tmp/conversion"
output_dir = "./.cache/caliberate/output/conversion"
job_history_path = "./.cache/caliberate/data/conversion-jobs.log"
job_logs_dir = "./.cache/caliberate/logs/jobs"
max_job_history = 500

[conversion.save_to_disk_presets]

[fts]
enabled = false
tokenizer = "unicode61 remove_diacritics 2"
rebuild_on_migrate = true
min_query_len = 2
result_limit = 100

[device]
mount_roots = [
    "./.cache/caliberate/devices",
    "/media",
    "/run/media",
]
library_subdir = "Caliberate Library"
send_auto_convert = false
send_overwrite = false
sync_metadata = true
sync_cover = true
scan_recursive = true
driver_backend = "auto"
connection_timeout_ms = 5000

[plugins]
enabled = true
plugins_dir = "./.cache/caliberate/plugins"

[network]
http_proxy = ""
https_proxy = ""
no_proxy = ""
offline_mode = false
dns_mode = "system"

[metadata_download]
timeout_ms = 7000
user_agent = "caliberate/0.1 (+https://example.invalid/caliberate)"
cover_max_bytes = 10485760
queue_batch_size = 32
max_results_per_provider = 5
providers = [
    "openlibrary",
    "googlebooks",
    "amazon",
    "isbndb",
]
openlibrary_enabled = true
openlibrary_base_url = "https://openlibrary.org"
googlebooks_enabled = true
googlebooks_base_url = "https://www.googleapis.com/books/v1"
googlebooks_api_key = ""
prefer_isbn_lookup = false
merge_tags_default = true
merge_identifiers_default = true
overwrite_title_default = true
overwrite_authors_default = true
overwrite_publisher_default = false
overwrite_language_default = false
overwrite_pubdate_default = false
overwrite_comment_default = false

[news]
enabled = true
recipes_dir = "./.cache/caliberate/news/recipes"
downloads_dir = "./.cache/caliberate/news/downloads"
history_path = "./.cache/caliberate/news/history.log"
retention_days = 30
auto_delete = true
fetch_limit = 20

[news.source_enabled]
hacker-news = true
lobsters = true
project-gutenberg = false

[news.source_schedule]
hacker-news = "hourly"
lobsters = "daily@06:00"
project-gutenberg = "weekly@sun-06:00"

[gui]
list_view_mode = "table"
table_row_height = 48.0
table_column_min_width = 80.0
table_column_max_width = 520.0
show_title = true
show_authors = true
show_series = true
show_tags = true
show_formats = true
show_rating = true
show_publisher = true
show_languages = true
show_cover = true
show_date_added = true
show_date_modified = true
show_pubdate = true
width_title = 240.0
width_authors = 180.0
width_series = 140.0
width_tags = 180.0
width_formats = 120.0
width_rating = 90.0
width_publisher = 160.0
width_languages = 120.0
width_cover = 72.0
width_date_added = 140.0
width_date_modified = 140.0
width_pubdate = 140.0
cover_thumb_size = 64.0
cover_preview_size = 200.0
cover_dir = "./.cache/caliberate/covers"
cover_cache_dir = "./.cache/caliberate/covers-cache"
cover_max_bytes = 10485760
reader_font_size = 16.0
reader_line_spacing = 1.4
reader_page_chars = 1800
reader_theme = "light"
app_theme = "system"
icon_set = "calibre"
startup_open_last_library = true
startup_restore_tabs = true
last_active_view = "library"
system_tray_mode = "disabled"
confirm_exit_with_jobs = true
toast_duration_secs = 6.0
toast_max = 4
search_history_max = 20
view_density = "comfortable"
quick_details_panel = true
show_format_badges = true
show_language_badges = true
column_order = [
    "title",
    "cover",
    "authors",
    "series",
    "tags",
    "formats",
    "rating",
    "publisher",
    "languages",
    "date_added",
    "date_modified",
    "pubdate",
]
stats_top_n = 8
group_mode = "none"
shelf_columns = 4
conditional_missing_cover = true
conditional_low_rating = true
low_rating_threshold = 4
color_missing_cover = "#d4a017"
color_low_rating = "#cc4444"
toolbar_icon_only = false
toolbar_visible_actions = [
    "add",
    "remove",
    "save_to_disk",
    "refresh",
    "preferences",
    "open_logs",
]
global_search_scope = "all"
shortcut_preset = "default"
command_palette_enabled = true
notification_center_enabled = true
drag_drop_hints = true
recent_libraries = ["./.cache/caliberate/data/caliberate.db"]
recent_libraries_max = 10
active_library_label = "Default Library"
window_width = 1400.0
window_height = 900.0
window_pos_x = 40.0
window_pos_y = 40.0
window_restore = true
mouse_gestures = true
pane_browser_visible = false
pane_browser_side = "left"
pane_details_visible = true
pane_details_side = "right"
pane_jobs_visible = true
pane_left_width = 1864.4375
pane_right_width = 900.71875
layout_preset = "classic"
user_manual_url = "https://manual.calibre-ebook.com/"
project_home_url = "https://calibre-ebook.com/"
report_issue_url = "https://github.com/kovidgoyal/calibre/issues"

[gui.sort_presets]

[gui.column_presets]

[gui.virtual_library_filters]
