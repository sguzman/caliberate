[app]
name = "caliberate"
environment = "test"
mode = "dev"
instance_id = "test"

[paths]
data_dir = "./data"
cache_dir = "./cache"
log_dir = "./logs"
tmp_dir = "./tmp"
library_dir = "./library"

[logging]
level = "info"
json = false
stdout = false
file_enabled = false
file_max_size_mb = 50
file_max_backups = 5

[db]
sqlite_path = "./data/caliberate.db"
pool_size = 4
busy_timeout_ms = 5000

[runtime]
worker_threads = 1
max_blocking_threads = 2
shutdown_timeout_ms = 100

[server]
host = "127.0.0.1"
port = 8080
url_prefix = ""
enable_auth = false

[metrics]
enabled = false
endpoint = ""
namespace = "caliberate"

[formats]
supported = ["epub"]
archive_formats = ["zip"]

[ingest]
default_mode = "copy"
archive_reference_enabled = true
duplicate_policy = "error"

[assets]
compress_raw_assets = true
compress_metadata_db = false
