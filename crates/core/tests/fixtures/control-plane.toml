[app]
name = "caliberate"
environment = "test"
mode = "dev"
instance_id = "test"

[paths]
data_dir = "./.cache/caliberate/data"
cache_dir = "./.cache/caliberate/cache"
log_dir = "./.cache/caliberate/logs"
tmp_dir = "./.cache/caliberate/tmp"
library_dir = "./.cache/caliberate/library"

[logging]
level = "info"
json = false
stdout = false
file_enabled = false
file_max_size_mb = 50
file_max_backups = 5

[db]
sqlite_path = "./data/caliberate.db"
pool_size = 4
busy_timeout_ms = 5000

[runtime]
worker_threads = 1
max_blocking_threads = 2
shutdown_timeout_ms = 100

[server]
host = "127.0.0.1"
port = 8080
scheme = "http"
url_prefix = ""
enable_auth = false
auth_mode = "bearer"
api_keys = []
download_enabled = true
download_max_bytes = 104857600
download_allow_external = false

[metrics]
enabled = false
endpoint = ""
namespace = "caliberate"

[formats]
supported = ["epub"]
archive_formats = ["zip"]

[ingest]
default_mode = "copy"
archive_reference_enabled = true
duplicate_policy = "error"
duplicate_identical_policy = "skip"
duplicate_compare = "checksum"
background_enabled = false
background_workers = 1
background_queue_capacity = 16

[assets]
compress_raw_assets = true
compress_metadata_db = false
hash_algorithm = "sha256"
hash_on_ingest = true
verify_checksum = true
compression_level = 3

[library]
delete_files_on_remove = false
delete_reference_files = false

[conversion]
enabled = true
allow_passthrough = true
max_input_bytes = 104857600
default_output_format = "epub"
temp_dir = "./tmp/conversion"
output_dir = "./output/conversion"

[fts]
enabled = false
tokenizer = "unicode61 remove_diacritics 2"
rebuild_on_migrate = true
min_query_len = 2
result_limit = 100

[device]
mount_roots = ["./.cache/caliberate/devices"]
library_subdir = "Caliberate Library"

[plugins]
enabled = true
plugins_dir = "./.cache/caliberate/plugins"

[gui]
list_view_mode = "table"
table_row_height = 48.0
table_column_min_width = 80.0
table_column_max_width = 520.0
show_title = true
show_authors = true
show_series = true
show_tags = true
show_formats = true
show_rating = true
show_publisher = true
show_languages = true
show_cover = true
width_title = 240.0
width_authors = 180.0
width_series = 140.0
width_tags = 180.0
width_formats = 120.0
width_rating = 90.0
width_publisher = 160.0
width_languages = 120.0
width_cover = 72.0
cover_thumb_size = 64.0
cover_preview_size = 200.0
cover_dir = "./.cache/caliberate/covers"
cover_cache_dir = "./.cache/caliberate/covers-cache"
cover_max_bytes = 10485760
reader_font_size = 16.0
reader_line_spacing = 1.4
reader_page_chars = 1800
reader_theme = "light"
toast_duration_secs = 6.0
toast_max = 4
